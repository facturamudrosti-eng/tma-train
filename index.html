<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планшет Машиниста</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; text-align: center; padding: 20px; }
        .card { border: 2px solid #00ff00; padding: 15px; border-radius: 10px; box-shadow: 0 0 10px #00ff00; }
        .highlight { color: #ffa500; font-weight: bold; }
        hr { border-color: #00ff00; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="card">
        <h2>СТАТУС-ПАНЕЛЬ</h2>
        <hr>
        <p>Машинист: <span id="username" class="highlight">Загрузка...</span></p>
        <p>Броня: <span id="hp" class="highlight">...</span></p>
        <p>Лом: <span id="scrap" class="highlight">...</span></p>
        <p>Топливо: <span id="fuel" class="highlight">...</span></p>
        <hr>
        <p>Синхронизация с локомотивом установлена.</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 
        
        // 1. Берем имя из Телеграма
        let user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('username').innerText = user.first_name;
        }

        // 2. Магия! Читаем ресурсы из ссылки, которую нам даст Python-бот
        let params = new URLSearchParams(window.location.search);
        
        // Вставляем данные на экран (если данных нет в ссылке, пишем "Ошибка")
        document.getElementById('hp').innerText = params.get('hp') || "Ошибка";
        document.getElementById('scrap').innerText = params.get('scrap') + " 🔩" || "Ошибка";
        document.getElementById('fuel').innerText = params.get('fuel') || "Ошибка";
    </script>
</body>
</html>
