<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планшет Машиниста</title>
    <style>
        body { 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center;
            color: #00ffcc; /* Цвет светящихся цифр */
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold;
            margin: 0;
            overflow: hidden; /* Убираем прокрутку */
            position: relative;
            height: 100vh;
        }
        
        /* Класс для плавающего текста */
        .sensor-data {
            position: absolute;
            font-size: 22px;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc; /* Эффект свечения экрана */
            transform: translate(-50%, -50%); /* Центровка относительно координат */
        }

        /* --- НАСТРОЙКА КООРДИНАТ ДАТЧИКОВ --- */
        /* Меняй проценты top (вверх-вниз) и left (влево-вправо), 
           чтобы посадить цифры ровно в нарисованные экраны! */
           
        #username { top: 15%; left: 50%; font-size: 26px; color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }
        
        #hp-container { top: 40%; left: 25%; }
        #scrap-container { top: 40%; left: 75%; }
        #fuel-container { top: 65%; left: 50%; font-size: 28px; color: #ff4444; text-shadow: 0 0 10px #ff4444; }

    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    
    <div id="username" class="sensor-data">Машинист</div>
    
    <div id="hp-container" class="sensor-data">
        <span id="hp">...</span> 🛡
    </div>
    
    <div id="scrap-container" class="sensor-data">
        <span id="scrap">...</span> 🔩
    </div>
    
    <div id="fuel-container" class="sensor-data">
        <span id="fuel">...</span> 🛢
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 
        
        let user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('username').innerText = user.first_name;
        }

        let params = new URLSearchParams(window.location.search);
        document.getElementById('hp').innerText = params.get('hp') || "-";
        document.getElementById('scrap').innerText = params.get('scrap') || "-";
        document.getElementById('fuel').innerText = params.get('fuel') || "-";
    </script>
</body>
</html>
