<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планшет Машиниста</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: #00ff00; 
            font-family: monospace; 
            text-align: center; 
            padding: 20px; 
        }
        .card { 
            border: 2px solid #00ff00; 
            padding: 15px; 
            border-radius: 10px; 
            box-shadow: 0 0 10px #00ff00;
        }
        .highlight { color: #ffa500; font-weight: bold; }
        hr { border-color: #00ff00; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="card">
        <h2>СТАТУС-ПАНЕЛЬ</h2>
        <hr>
        <p>Машинист: <span id="username" class="highlight">Загрузка данных...</span></p>
        <p>ID связи: <span id="userid" class="highlight">...</span></p>
        <hr>
        <p>Синхронизация с локомотивом установлена.</p>
    </div>

    <script>
        // Инициализируем Telegram Web App
        let tg = window.Telegram.WebApp;
        
        // Говорим приложению открываться на всю высоту
        tg.expand(); 

        // Вытаскиваем данные пользователя
        let user = tg.initDataUnsafe.user;

        if (user) {
            // Если данные есть, подставляем имя и ID в HTML
            document.getElementById('username').innerText = user.first_name;
            document.getElementById('userid').innerText = user.id;
        } else {
            // Если открыли не из Телеграма (например, просто в браузере)
            document.getElementById('username').innerText = "Неизвестный странник";
        }
    </script>
</body>
</html>
